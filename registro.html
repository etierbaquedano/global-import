<!-- rea un formulario de registro que contenga los siguientescampos nombre completo, fecha de nacimiento, rut,genero y nacionalidad  y con su propia hoja de estilos  -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro - GlobalImport S.A.</title>
  <link rel="stylesheet" href="registro.css" />
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
        <a class="brand" href="index.html">GlobalImport S.A.</a>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="index.html#services">Servicios</a></li>
            <li><a href="index.html#contact">Contacto</a></li>
            <li><a class="register-link" href="#">Registro</a></li>
        </ul>
        </nav>
    </header>
    
    <main>
        <section class="registration-section">
        <h1>Formulario de Registro</h1>
        <form class="registration-form">
            <div class="form-group-datos-personales">
                <label for="full-name">Nombre Completo:</label>
                <input type="text" id="full-name" name="full-name" required />
        
                <label for="birth-date">Fecha de Nacimiento:</label>
                <input type="date" id="birth-date" name="birth-date" required />
        
                <label for="rut">RUT:</label>
                <input type="text" id="rut" name="rut" required />    

                <label for="gender">Género:</label>
                <select id="gender" name="gender" required>
                    <option value="">Seleccione</option>
                    <option value="masculino">Masculino</option>
                    <option value="femenino">Femenino</option>
                    <option value="otro">Otro</option>
                </select>

                <label for="nationality">Nacionalidad:</label>
                <select id="nationality" name="nationality" required>
                    <option value="">Seleccione</option>
                    <option value="chilena">Chilena</option>
                    <option value="argentina">Argentina</option>
                    <option value="peruana">Peruana</option>
                    <option value="otra">Otra</option>
                </select>
            </div>
            <div class="form-group-form-group- Datos de Contacto y Acceso">
                <h2>Datos de Contacto y Acceso</h2>

                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" required />

                <label for="confirm-email">Confirmar correo electrónico:</label>
                <input type="email" id="confirm-email" name="confirm-email" required />

                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required />

                <label for="confirm-password">Confirmar contraseña:</label>
                <input type="password" id="confirm-password" name="confirm-password" required />

                <label for="phone">Teléfono:</label>
                <input type="tel" id="phone" name="phone" required />
            </div>
        </form>
        </section>
    </main>
</body>
</html>
